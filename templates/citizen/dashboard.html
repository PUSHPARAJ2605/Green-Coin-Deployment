{% extends 'base.html' %}

{% block title %}Citizen Dashboard - CivicWaste{% endblock %}

{% block content %}
<nav class="navbar">
    <div style="flex: 1;">
        <a href="/dashboard/citizen/" class="logo">🌿 CivicWaste</a>
    </div>
    <div style="flex: 1; display: flex; justify-content: center;">
        <span class="role-badge role-citizen">● CITIZEN</span>
    </div>
    <div style="flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 15px;">
        <a href="/redeem/" style="text-decoration: none; color: var(--green-primary); font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 4px;">
            <i class="bi bi-gift"></i> Redeem
        </a>
        <div id="userInitials" style="width: 32px; height: 32px; background: var(--green-pale); color: var(--green-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;">JD</div>
        <div id="logoutBtn" style="display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-muted);">
            <i class="bi bi-box-arrow-right" style="font-size: 20px;"></i>
            <span style="font-size: 14px; font-weight: 600;">Logout</span>
        </div>
    </div>
</nav>

<div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
    <!-- Search Bar -->
    <div style="margin-bottom: 24px; position: relative;">
        <input type="text" placeholder="Search rewards, recycling centers, or reports..." style="width: 100%; border-radius: 24px; border: 1px solid var(--border); padding: 12px 20px 12px 48px; background: var(--white);">
        <i class="bi bi-search" style="position: absolute; left: 16px; top: 12px; color: var(--text-muted);"></i>
    </div>

    <!-- Map Section -->
    <div class="card" style="padding: 0; overflow: hidden; height: 400px; margin-bottom: 24px; position: relative;">
        <div id="map" style="height: 100%; width: 100%;"></div>
        <div style="position: absolute; top: 10px; right: 10px; background: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; box-shadow: var(--shadow); z-index: 400;">
            <div style="margin-bottom: 4px;"><span style="color: #1565C0;">●</span> Reported</div>
            <div style="margin-bottom: 4px;"><span style="color: #D97706;">●</span> In Progress</div>
            <div><span style="color: #2E7D32;">●</span> Collected</div>
        </div>
    </div>

    <!-- Filter Pills -->
    <div style="display: flex; gap: 10px; margin-bottom: 32px; overflow-x: auto; padding-bottom: 8px;">
        <button class="pill active">● My Reports</button>
        <button class="pill">● Centers</button>
        <button class="pill">● Nearby</button>
    </div>

    <!-- Report Waste Section -->
    <div class="card" style="margin-bottom: 32px;">
        <h3 style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <i class="bi bi-camera" style="color: var(--green-primary);"></i> Report Waste
        </h3>
        
        <form id="reportForm">
            <div style="margin-bottom: 20px;">
                <div style="display: flex; gap: 12px;">
                    <div style="flex: 1; height: 48px; border: 2px solid var(--green-primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--green-primary); font-weight: 600; cursor: pointer;">
                        <i class="bi bi-image"></i> Gallery
                    </div>
                    <label for="photoInput" style="flex: 1; height: 48px; border: 2px solid var(--green-primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--green-primary); font-weight: 600; cursor: pointer;">
                        <i class="bi bi-camera"></i> Camera
                        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
                    </label>
                </div>
                <div id="photoPreview" style="margin-top: 15px; display: none; position: relative; width: 100px;">
                    <img id="previewImg" src="" style="width: 100px; height: 100px; object-fit: cover; border-radius: 10px;">
                    <div id="removePhoto" style="position: absolute; top: -10px; right: -10px; background: #DC2626; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                        <i class="bi bi-x"></i>
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <select id="wasteType" class="form-input" style="margin-bottom: 15px;">
                    <option value="" disabled selected>What kind of waste?</option>
                    <option value="Garbage on Road">Garbage on Road</option>
                    <option value="Plastic Waste">Plastic Waste</option>
                    <option value="Construction Waste">Construction Waste</option>
                    <option value="Medical Waste">Medical Waste</option>
                    <option value="Dead Animals">Dead Animals</option>
                    <option value="Other">Other</option>
                </select>
                <textarea id="description" class="form-input" placeholder="What kind of waste is it?" style="min-height: 80px; resize: none;"></textarea>
            </div>

            <div style="display: flex; gap: 12px;">
                <button type="button" class="btn-secondary" style="flex: 1;">Cancel</button>
                <button type="submit" class="btn-primary" style="flex: 1;">Submit Report</button>
            </div>
        </form>
    </div>

    <!-- Recent Activity -->
    <div>
        <label style="color: var(--text-muted); font-size: 11px; font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 16px;">RECENT ACTIVITY</label>
        <div id="activityList">
            <!-- Dynamic Content -->
        </div>
    </div>

</div>

<style>
.pill {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
}
.pill.active {
    background: #1A1A1A;
    color: var(--white);
    border-color: #1A1A1A;
}

.activity-row {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
}
.activity-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--green-pale);
    color: var(--green-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}
</style>

{% block extra_js %}
<script src="/static/js/map.js"></script>
<script src="/static/js/report.js"></script>
<script>
    // Initialize Dashboard
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'citizen') window.location.href = '/';
    
    document.getElementById('userInitials').innerText = user.full_name.split(' ').map(n=>n[0]).join('').toUpperCase();
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = '/';
    });
</script>
{% endblock %}
{% endblock %}
