{% extends 'base.html' %}

{% block title %}Create Account - CivicWaste{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 40px; border-color: var(--green-primary);">
        <div style="text-align: center; margin-bottom: 32px;">
            <a href="/" class="logo" style="justify-content: center; font-size: 28px; margin-bottom: 8px;">🌿 CivicWaste</a>
            <p style="color: var(--text-muted); font-size: 14px;">Join our community</p>
        </div>
        
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="full_name" class="form-input" placeholder="Full Name" aria-label="Full Name" required>
            </div>
            
            <div class="input-group">
                <input type="email" id="email" class="form-input" placeholder="Email Address" aria-label="Email Address" required>
            </div>
            
            <div class="input-group">
                <div style="position: relative;">
                    <input type="password" id="password" class="form-input" placeholder="Password" aria-label="Password" required>
                    <i class="bi bi-eye" id="togglePassword" style="position: absolute; right: 16px; top: 16px; color: var(--text-muted); cursor: pointer;"></i>
                </div>
            </div>
            
            <div class="input-group">
                <div style="display: flex; gap: 12px;">
                    <button type="button" id="btnCitizen" class="role-toggle active" style="flex: 1; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i class="bi bi-person"></i> Citizen
                    </button>
                    <button type="button" id="btnCollector" class="role-toggle" style="flex: 1; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i class="bi bi-truck"></i> Collector
                    </button>
                </div>
                <input type="hidden" id="role" value="citizen">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; height: 48px; margin-bottom: 24px;">Create Account</button>
        </form>
        
        <style>
            .role-toggle {
                background: var(--white);
                border: 2px solid var(--border);
                color: var(--text-muted);
                font-weight: 600;
            }
            .role-toggle.active {
                background: var(--green-primary);
                border-color: var(--green-primary);
                color: var(--white);
            }
        </style>
        
        <p style="text-align: center; font-size: 14px; color: var(--text-muted);">
            Already have an account? <a href="/" style="color: var(--green-primary); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>
</div>

<script>
const btnCitizen = document.getElementById('btnCitizen');
const btnCollector = document.getElementById('btnCollector');
const roleInput = document.getElementById('role');

btnCitizen.addEventListener('click', () => {
    btnCitizen.classList.add('active');
    btnCollector.classList.remove('active');
    roleInput.value = 'citizen';
});

btnCollector.addEventListener('click', () => {
    btnCollector.classList.add('active');
    btnCitizen.classList.remove('active');
    roleInput.value = 'collector';
});

document.getElementById('togglePassword').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
    pwd.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const full_name = document.getElementById('full_name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const role = roleInput.value;
    
    try {
        const response = await fetch('/api/auth/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ full_name, email, password, role })
        });
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('access', data.access);
            localStorage.setItem('refresh', data.refresh);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            if (data.user.role === 'citizen') {
                window.location.href = '/dashboard/citizen/';
            } else {
                window.location.href = '/dashboard/collector/';
            }
        } else {
            alert(JSON.stringify(data));
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}
