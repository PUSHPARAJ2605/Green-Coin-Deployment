{% extends 'base.html' %}

{% block title %}Sign In - CivicWaste{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 40px; border-color: var(--green-primary);">
        <div style="text-align: center; margin-bottom: 32px;">
            <a href="/" class="logo" style="justify-content: center; font-size: 28px; margin-bottom: 8px;">🌿 CivicWaste</a>
            <p style="color: var(--text-muted); font-size: 14px;">Welcome back</p>
        </div>
        
        <div id="loginError" class="error-message"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" class="form-input" placeholder="Email Address" aria-label="Email Address" required>
            </div>
            
            <div class="input-group">
                <div style="position: relative;">
                    <input type="password" id="password" class="form-input" placeholder="Password" aria-label="Password" required>
                    <i class="bi bi-eye" id="togglePassword" style="position: absolute; right: 16px; top: 16px; color: var(--text-muted); cursor: pointer;"></i>
                </div>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; height: 48px; margin-bottom: 24px;">Sign In</button>
        </form>
        
        <p style="text-align: center; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="/register/" style="color: var(--green-primary); font-weight: 600; text-decoration: none;">Register</a>
        </p>
    </div>
</div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
    pwd.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const loginError = document.getElementById('loginError');
    loginError.style.display = 'none';
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const response = await fetch('/api/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('access', data.access);
            localStorage.setItem('refresh', data.refresh);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            if (data.user.role === 'citizen') {
                window.location.href = '/dashboard/citizen/';
            } else {
                window.location.href = '/dashboard/collector/';
            }
        } else {
            loginError.innerText = data.error || 'Invalid credentials. Please try again.';
            loginError.style.display = 'block';
        }
    } catch (err) {
        console.error(err);
        loginError.innerText = 'Something went wrong. Please try again later.';
        loginError.style.display = 'block';
    }
});
</script>
{% endblock %}
