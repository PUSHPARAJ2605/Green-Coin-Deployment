{% extends 'base.html' %}

{% block title %}Submission Rejected - CivicWaste{% endblock %}

{% block content %}
<div class="penalty-container">
    <div class="bg-glow"></div>
    
    <div class="penalty-card glass-card">
        <div class="header-banner">
            <div class="siren-wrapper">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            <h1 class="penalty-title">SUBMISSION REJECTED</h1>
        </div>
        
        <div class="content-body">
            <p class="penalty-message">
                AI strictly rejected this image. Please upload actual photographs of waste or animals, not screenshots or documents.
            </p>
            
            <div class="penalty-badge">
                <span class="minus">-</span>
                <span class="amount">20</span>
                <span class="unit">Coins</span>
            </div>
            
            <button onclick="window.location.href='/dashboard/citizen/'" class="btn-return">
                RETURN TO DASHBOARD
            </button>
        </div>
    </div>
</div>

<style>
.penalty-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
}

.bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(239, 68, 68, 0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

.penalty-card {
    width: 100%;
    max-width: 440px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    z-index: 1;
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

.header-banner {
    background: #D32F2F;
    padding: 40px 20px;
    text-align: center;
    position: relative;
}

.siren-wrapper {
    font-size: 60px;
    color: white;
    margin-bottom: 20px;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.1); }
}

.penalty-title {
    color: white;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 2px;
    margin: 0;
}

.content-body {
    padding: 40px;
    text-align: center;
}

.penalty-message {
    color: #9CA3AF;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 32px;
}

.penalty-badge {
    background: rgba(211, 47, 47, 0.1);
    border: 2px solid #D32F2F;
    border-radius: 100px;
    padding: 16px 32px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    box-shadow: 0 0 30px rgba(211, 47, 47, 0.2);
}

.penalty-badge .minus {
    font-size: 32px;
    font-weight: 800;
    color: #D32F2F;
}

.penalty-badge .amount {
    font-size: 48px;
    font-weight: 900;
    color: white;
}

.penalty-badge .unit {
    font-size: 24px;
    font-weight: 700;
    color: white;
    opacity: 0.8;
}

.btn-return {
    width: 100%;
    background: #1F2937;
    color: white;
    border: none;
    padding: 20px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-return:hover {
    background: #374151;
    transform: translateY(-2px);
}
</style>
{% endblock %}
